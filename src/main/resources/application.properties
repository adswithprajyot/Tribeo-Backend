spring.application.name=Tribeo

server.port=${SERVER_PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/myapp}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:cipher}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}

spring.security.user.name=${SPRING_SECURITY_USER_NAME:admin}
spring.security.user.password=${SPRING_SECURITY_USER_PASSWORD:admin@123}

spring.app.jwtSecret=${SPRING_APP_JWT_SECRET:VHJpYmVvRGV2ZWxvcG1lbnRTZWNyZXRLZXlGb3JMb2NhbFRlc3RpbmdPbmx5MTIzNDU2Nzg5MA==}
spring.app.jwtExpirationMs=${SPRING_APP_JWT_EXPIRATION_MS:900000}
spring.app.jwtRefreshExpirationMs=${SPRING_APP_JWT_REFRESH_EXPIRATION_MS:604800000}
spring.app.jwtCookieSecure=${SPRING_APP_JWT_COOKIE_SECURE:false}
spring.app.jwtCookieSameSite=${SPRING_APP_JWT_COOKIE_SAME_SITE:Lax}
spring.app.jwtCookieDomain=${SPRING_APP_JWT_COOKIE_DOMAIN:}
spring.ecom.app.jwtCookieName=${SPRING_ECOM_APP_JWT_COOKIE_NAME:tribeo-jwt}
spring.ecom.app.jwtRefreshCookieName=${SPRING_ECOM_APP_JWT_REFRESH_COOKIE_NAME:tribeo-refresh-jwt}

frontend.url=${FRONTEND_URL:http://localhost:5173/}

logging.level.org.springframework=${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK:INFO}
logging.level.org.hibernate.SQL=${LOGGING_LEVEL_ORG_HIBERNATE_SQL:INFO}
logging.level.org.springframework.security=${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY:INFO}
logging.level.com.example.tribeo=${LOGGING_LEVEL_COM_EXAMPLE_TRIBEO:INFO}


#mail properties
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.protocol=smtp
spring.mail.ssl.enabled=false
spring.mail.default-encoding=UTF-8
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
